version: 2
updates:
  # NPM Dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: "auto"
    reviewers:
      - "MxrixLu"
    assignees:
      - "MxrixLu"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore"
      prefix-scope: "deps"
      include: "scope"
    # Agrupar actualizaciones
    groups:
      security:
        patterns:
          - "next*"
          - "*bcrypt*"
          - "*jsonwebtoken*"
        update-types:
          - "patch"
          - "minor"
          - "major"
      dev:
        patterns:
          - "@testing-library/*"
          - "jest*"
          - "eslint*"
        update-types:
          - "patch"
          - "minor"
      non-major:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      major:
        patterns:
          - "*"
        update-types:
          - "major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: "auto"
    reviewers:
      - "MxrixLu"
    labels:
      - "ci"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

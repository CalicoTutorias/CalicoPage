name: 🔨 Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  security-and-build:
    name: Security & Build Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔒 NPM Audit (MODERADO+)
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - name: 🧹 ESLint
        run: npm run lint
        continue-on-error: true

      - name: 🏗️ Build Next.js
        run: npm run build
        continue-on-error: false

      - name: ✅ Tests
        run: npm test -- --coverage
        continue-on-error: true

      - name: 📊 Reporte de Seguridad
        if: always()
        run: |
          echo "## ✅ Verificación de Seguridad Completada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checklist" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ NPM Audit: OK" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build: OK" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Tests: Ejecutados" >> $GITHUB_STEP_SUMMARY

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔍 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript'

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🏗️ Build (para análisis)
        run: npm run build
        continue-on-error: true

      - name: 📊 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

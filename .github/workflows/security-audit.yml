name: 🔒 Security Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Ejecutar auditoría de seguridad cada lunes a las 9:00 AM UTC
    - cron: '0 9 * * 1'

jobs:
  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔍 Ejecutar npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - name: 📊 Reporte detallado de vulnerabilidades
        if: failure()
        run: |
          echo "## 🚨 Vulnerabilidades Detectadas" >> $GITHUB_STEP_SUMMARY
          npm audit >> $GITHUB_STEP_SUMMARY || true

      - name: ✅ Verificación de auditoría completada
        if: success()
        run: |
          echo "## ✅ Auditoría de Seguridad Exitosa" >> $GITHUB_STEP_SUMMARY
          echo "- No se encontraron vulnerabilidades moderadas o altas" >> $GITHUB_STEP_SUMMARY
          npm audit --json | jq '.metadata.vulnerabilities' >> $GITHUB_STEP_SUMMARY || true

  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔐 Verificar vulnerabilidades críticas
        run: |
          npm audit --json > audit-report.json
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-report.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-report.json)
          
          echo "Vulnerabilidades Críticas: $CRITICAL"
          echo "Vulnerabilidades Altas: $HIGH"
          
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ Se encontraron vulnerabilidades críticas o altas"
            exit 1
          fi
          echo "✅ No hay vulnerabilidades críticas o altas"

      - name: 📤 Subir reporte de auditoría
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 📋 Verificar licencias
        run: npm ls --depth=0
        continue-on-error: true

      - name: ℹ️ Info de licencias
        run: |
          echo "## 📋 Dependencias Directas" >> $GITHUB_STEP_SUMMARY
          npm ls --depth=0 >> $GITHUB_STEP_SUMMARY || true

  publish-results:
    name: Publish Security Results
    runs-on: ubuntu-latest
    needs: [npm-audit, dependency-check]
    if: always()
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📥 Descargar reporte de auditoría
        uses: actions/download-artifact@v4
        with:
          name: audit-report

      - name: 📊 Resumen en PR/Commit
        run: |
          if [ -f audit-report.json ]; then
            echo "## 🔒 Auditoría de Seguridad - Resultados" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            TOTAL=$(jq '.metadata.vulnerabilities.total // 0' audit-report.json)
            CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-report.json)
            HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-report.json)
            MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-report.json)
            LOW=$(jq '.metadata.vulnerabilities.low // 0' audit-report.json)
            
            echo "| Severidad | Cantidad |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 Crítica | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 Alta | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟡 Moderada | $MODERATE |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟠 Baja | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
          fi

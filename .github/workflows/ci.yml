name: CI Test Suite

on:
  pull_request:
    branches: [dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # This caches your node_modules automatically

      - name: Install Dependencies
        run: npm ci # 'npm ci' is better for CI than 'npm install' because it's faster and stricter

      - name: Run Tests
        run: npm test # This will automatically find everything in src/__tests__
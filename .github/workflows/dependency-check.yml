name: Dependency Check

on:
  schedule:
    # Ejecutar cada lunes a las 9 AM UTC
    - cron: '0 9 * * 1'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    name: 📦 Dependency Vulnerability Check
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: 📚 Install dependencies
        run: npm ci
      
      - name: 🔴 Check for critical vulnerabilities
        run: |
          echo "🔍 Checking for critical vulnerabilities..."
          npm audit --audit-level=critical --json > audit-critical.json || echo "Critical vulnerabilities found"
          
          # Parse JSON and check if vulnerabilities exist
          if grep -q '"vulnerabilities"' audit-critical.json; then
            echo "❌ CRITICAL vulnerabilities detected!"
            cat audit-critical.json | jq '.metadata.vulnerabilities'
            exit 1
          else
            echo "✅ No critical vulnerabilities found"
          fi
      
      - name: 🟠 Check for high vulnerabilities
        run: |
          echo "🔍 Checking for high vulnerabilities..."
          npm audit --audit-level=high --json > audit-high.json || true
          
          # Count high/critical vulnerabilities
          VULN_COUNT=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.high // 0')
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "⚠️ Found $VULN_COUNT high severity vulnerabilities"
            npm audit --audit-level=high
          else
            echo "✅ No high severity vulnerabilities found"
          fi
      
      - name: 📊 Generate detailed audit report
        if: always()
        run: |
          npm audit --json > full-audit-report.json || true
          
          echo "## 📋 Dependency Audit Report" > audit-summary.md
          echo "" >> audit-summary.md
          echo "**Generated:** $(date)" >> audit-summary.md
          echo "**Total Packages:** $(npm list --json 2>/dev/null | jq '.metadata.packages // 0')" >> audit-summary.md
          echo "" >> audit-summary.md
          
          # Extract vulnerability summary
          if grep -q '"vulnerabilities"' full-audit-report.json; then
            echo "### Vulnerabilities Found:" >> audit-summary.md
            cat full-audit-report.json | jq '.vulnerabilities | to_entries[] | "- **\(.key)**: \(.value.severity) severity"' -r >> audit-summary.md
          else
            echo "✅ **No vulnerabilities detected**" >> audit-summary.md
          fi
      
      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('audit-summary.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
      
      - name: 📤 Upload audit reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: dependency-audit-reports
          path: |
            audit-critical.json
            audit-high.json
            full-audit-report.json
            audit-summary.md
          retention-days: 30
